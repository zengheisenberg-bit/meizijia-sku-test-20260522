<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>甜品店经营管理工具</title>
  <style>
    :root {
      --accent: #d4a574;
      --bg: #f5efe6;
      --surface: #ffffff;
      --text: #333333;
      --muted: #777777;
      --line: #eadfce;
      --danger: #b85c5c;
      --warning: #b88932;
      --success: #4f8f68;
      --radius: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { overflow-x: hidden; }
    body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
    button, input, select, textarea { font: inherit; }
    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 236px 1fr; }
    .sidebar { background: #fffaf4; border-right: 1px solid var(--line); padding: 20px 14px; }
    .brand { font-weight: 700; margin-bottom: 18px; line-height: 1.35; }
    .brand small { display: block; margin-top: 4px; color: var(--muted); font-weight: 500; }
    .nav-button { width: 100%; border: 0; background: transparent; text-align: left; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text); }
    .nav-button:hover { background: #f1e6d8; }
    .nav-button.active { background: var(--accent); color: #ffffff; }
    .main { padding: 24px; min-width: 0; max-width: 100%; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    .page-header > div { min-width: 0; }
    .page-title { margin: 0; font-size: 28px; line-height: 1.2; }
    .page-subtitle { margin: 8px 0 0; color: var(--muted); line-height: 1.6; }
    .primary-button { border: 0; border-radius: 8px; background: var(--text); color: #ffffff; padding: 10px 14px; cursor: pointer; white-space: nowrap; }
    .primary-button:hover { background: #111111; }
    .ghost-button { border: 1px solid var(--line); border-radius: 8px; background: #fffdf9; color: var(--text); padding: 8px 10px; cursor: pointer; white-space: nowrap; }
    .ghost-button:hover { background: #f1e6d8; }
    .page { display: block; }
    .card, .panel { min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .grid { display: grid; gap: 14px; }
    .kpi-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .sku-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .dashboard-grid { grid-template-columns: minmax(0, 1.4fr) minmax(320px, .8fr); align-items: start; }
    .panel-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .workflow-step-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); align-items: stretch; }
    .workflow-step-card { display: grid; grid-template-columns: 34px minmax(0, 1fr); gap: 10px; align-items: start; min-height: 118px; border: 1px solid var(--line); border-radius: 10px; background: #fffdf9; padding: 12px; }
    .step-number { display: inline-grid; place-items: center; width: 28px; height: 28px; border-radius: 999px; background: var(--text); color: #ffffff; font-size: 13px; font-weight: 750; }
    .step-title { font-weight: 750; line-height: 1.35; overflow-wrap: anywhere; }
    .step-hint { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .step-status { margin-top: 8px; }
    .status-card-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .status-card { min-width: 0; border: 1px solid var(--line); border-radius: 10px; background: #fffdf9; padding: 12px; }
    .status-card-label { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .status-card-value { margin-top: 8px; font-size: 20px; font-weight: 750; line-height: 1.2; overflow-wrap: anywhere; }
    .status-card-note { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .anomaly-list { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 4px; }
    .feishu-setup-steps { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 12px 0 14px; }
    .setup-step { border: 1px solid var(--line); border-radius: 10px; background: #fffdf9; padding: 10px; min-width: 0; }
    .kpi-label { color: var(--muted); font-size: 13px; }
    .kpi-value { margin-top: 8px; font-size: 24px; font-weight: 750; line-height: 1.2; overflow-wrap: anywhere; }
    .kpi-note { margin-top: 8px; color: var(--muted); font-size: 12px; }
    .panel-title { margin: 0 0 12px; font-size: 18px; }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .panel-header .panel-title { margin: 0; }
    .panel-caption { color: var(--muted); font-size: 13px; line-height: 1.5; margin-top: 4px; }
    .metric-row, .list-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line); }
    .metric-row:first-child, .list-row:first-child { border-top: 0; padding-top: 0; }
    .metric-row > *, .list-row > * { min-width: 0; }
    .row-title { font-weight: 650; overflow-wrap: anywhere; }
    .row-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .row-value { font-weight: 700; text-align: right; white-space: nowrap; }
    .trend-bars { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; align-items: end; min-height: 150px; }
    .trend-bar-wrap { display: grid; gap: 6px; align-content: end; min-width: 0; }
    .trend-bar { border-radius: 8px 8px 3px 3px; background: linear-gradient(180deg, #d4a574, #8fb0a9); min-height: 8px; }
    .trend-label { color: var(--muted); font-size: 11px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggestion-card { display: grid; gap: 6px; padding: 12px 0; border-top: 1px solid var(--line); }
    .suggestion-card:first-child { border-top: 0; padding-top: 0; }
    .badge { display: inline-block; width: fit-content; border-radius: 999px; padding: 3px 8px; background: #f1e6d8; color: #6d4b22; font-size: 12px; white-space: nowrap; }
    .badge.danger { background: #f8e7e7; color: var(--danger); }
    .badge.warning { background: #faefd7; color: var(--warning); }
    .badge.success { background: #e6f2ea; color: var(--success); }
    .button-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .button-row .ghost-button, .button-row .primary-button { max-width: 100%; }
    .entity-table-wrap { max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .entity-table { width: 100%; border-collapse: collapse; min-width: 720px; }
    .entity-table th, .entity-table td { border-top: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
    .entity-table th { color: var(--muted); font-size: 13px; font-weight: 650; }
    .entity-table tbody tr:first-child td { border-top: 1px solid var(--line); }
    .empty-state { color: var(--muted); line-height: 1.6; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .daily-form { display: grid; gap: 16px; }
    .daily-grid { display: grid; grid-template-columns: minmax(0, 1.12fr) minmax(340px, .88fr); gap: 16px; align-items: start; }
    .youzan-grid, .wecom-grid { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(340px, .95fr); gap: 16px; align-items: start; }
    .daily-primary, .daily-secondary { display: grid; gap: 14px; align-content: start; }
    .category-entry-row { display: grid; grid-template-columns: minmax(180px, 1.2fr) minmax(120px, .7fr) minmax(120px, .7fr) minmax(130px, .8fr); gap: 12px; align-items: end; padding: 12px 0; border-top: 1px solid var(--line); }
    .category-entry-row:first-of-type { border-top: 0; padding-top: 0; }
    .form-field { display: grid; gap: 6px; min-width: 0; }
    .form-field label, .field-label { color: var(--muted); font-size: 13px; }
    .form-field input, .form-field select, .form-field textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fffdf9; color: var(--text); padding: 9px 10px; }
    .form-field textarea { min-height: 72px; resize: vertical; }
    .product-entry-row { display: grid; grid-template-columns: minmax(0, 1fr) 128px; gap: 12px; align-items: center; padding: 10px 0; border-top: 1px solid var(--line); }
    .product-entry-row:first-child { border-top: 0; padding-top: 0; }
    .staff-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 10; max-width: min(360px, calc(100vw - 28px)); border-radius: 8px; background: #26352d; color: #ffffff; padding: 11px 14px; box-shadow: 0 10px 24px rgba(0,0,0,.18); }
    .mobile-tabbar { position: fixed; left: 0; right: 0; bottom: 0; gap: 0; background: #fffaf4; border-top: 1px solid var(--line); z-index: 20; overflow-x: auto; overscroll-behavior-x: contain; -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom); }
    .mobile-tabbar .nav-button { border-radius: 0; text-align: center; font-size: 12px; line-height: 1.25; padding: 10px 8px; flex: 0 0 118px; white-space: normal; }
    @media (max-width: 1180px) and (min-width: 769px) {
      .app-shell { grid-template-columns: 216px minmax(0, 1fr); }
      .kpi-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .dashboard-grid, .panel-grid { grid-template-columns: 1fr; }
      .workflow-step-grid, .status-card-grid, .feishu-setup-steps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sku-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 768px) {
      .app-shell { display: block; padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
      .sidebar { display: none; }
      .main { padding: 14px 12px 18px; }
      .page-title { font-size: 24px; }
      .page-subtitle { font-size: 14px; }
      .card, .panel { padding: 13px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .dashboard-grid, .panel-grid, .form-grid, .staff-grid, .sku-grid, .workflow-step-grid, .status-card-grid, .feishu-setup-steps { grid-template-columns: 1fr; }
      .workflow-step-card { min-height: 0; }
      .daily-grid, .youzan-grid, .wecom-grid, .category-entry-row { grid-template-columns: 1fr; }
      .product-entry-row { grid-template-columns: 1fr; }
      .page-header { display: grid; }
      .primary-button { width: 100%; white-space: normal; line-height: 1.35; }
      .button-row > button { flex: 1 1 132px; white-space: normal; line-height: 1.35; }
      .metric-row { align-items: flex-start; }
      .row-value { white-space: normal; overflow-wrap: anywhere; }
      .entity-table { min-width: 640px; }
      .toast { right: 12px; bottom: calc(70px + env(safe-area-inset-bottom)); }
      .mobile-tabbar { display: flex; }
    }
    @media (min-width: 769px) { .mobile-tabbar { display: none; } }
  </style>
</head>
<body>
  <div id="app" class="app-shell"></div>
  <script id="app-script">
  (function(global) {
    "use strict";
    let appState = null;
    let currentPage = "dashboard";
    let globalEventsBound = false;
    const PAGE_DEFS = [
      { id: "dashboard", label: "经营驾驶舱" },
      { id: "daily", label: "每日录入" },
      { id: "sku", label: "SKU 成本利润卡" },
      { id: "products", label: "产品配方" },
      { id: "ingredients", label: "原料价格库" },
      { id: "calibration", label: "月度成本校准" },
      { id: "employees", label: "员工与人效" },
      { id: "suggestions", label: "决策建议" },
      { id: "youzan", label: "有赞导入映射" },
      { id: "wecom", label: "企业微信动作闭环" },
      { id: "production", label: "生产同步加固" },
      { id: "settings", label: "设置与数据管理" }
    ];
    const STORAGE_KEY = "dessert_sku_profit_tool_v2";
    const STATIC_SYNC_API_BASE_URL = String(global.SKU_TOOL_SYNC_API_BASE_URL || "").replace(/\/+$/, "");
    function toNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }
    function roundMoney(value) {
      return Math.round(toNumber(value) * 100) / 100;
    }
    function clampNonNegative(value) {
      return Math.max(0, toNumber(value));
    }
    function clampRate(value) {
      return Math.min(1, Math.max(0, toNumber(value)));
    }
    function roundMoneyObject(object) {
      return Object.keys(object || {}).reduce((result, key) => {
        result[key] = roundMoney(object[key]);
        return result;
      }, {});
    }
    function getIngredient(state, id) {
      return ((state && Array.isArray(state.ingredients)) ? state.ingredients : []).find((item) => item.id === id) || null;
    }
    function getDirectProductionHourlyRate(state) {
      const employees = ((state && Array.isArray(state.employees)) ? state.employees : []).filter((item) => (
        item &&
        item.costAllocation === "direct_production" &&
        item.isActive !== false
      ));
      if (!employees.length) return 0;
      const totals = employees.reduce((result, item) => {
        const wage = toNumber(item.wage);
        let hours = 0;
        if (item.wageType === "monthly") {
          hours = toNumber(item.workDays) * toNumber(item.dailyHours);
        } else if (item.wageType === "daily") {
          hours = toNumber(item.dailyHours);
        } else {
          hours = 1;
        }
        if (hours <= 0) return result;
        result.wage += wage;
        result.hours += hours;
        return result;
      }, { wage: 0, hours: 0 });
      return totals.hours > 0 ? totals.wage / totals.hours : 0;
    }
    function calculateProductStandardCost(product, state) {
      const productItem = product || {};
      const ingredientCost = (Array.isArray(productItem.bom) ? productItem.bom : []).reduce((sum, item) => {
        const ingredientItem = getIngredient(state, item.ingredientId);
        return sum + toNumber(item.qty) * toNumber(ingredientItem && ingredientItem.currentPrice);
      }, 0);
      const packagingCost = toNumber(productItem.packagingCost);
      const manualLaborHourlyRate = toNumber(productItem.manualLaborHourlyRate, NaN);
      const directLaborHourlyRate = (
        productItem.directLaborHourlyRateMode === "manual" &&
        Number.isFinite(manualLaborHourlyRate)
      ) ? manualLaborHourlyRate : getDirectProductionHourlyRate(state);
      const directLaborCost = toNumber(productItem.laborMinutes) / 60 * directLaborHourlyRate;
      const standardLossCost = (ingredientCost + packagingCost) * toNumber(productItem.productLossRate);
      return roundMoneyObject({
        ingredientCost,
        packagingCost,
        directLaborCost,
        standardLossCost,
        standardCost: ingredientCost + packagingCost + directLaborCost + standardLossCost
      });
    }
    function calculateAllowableCost(netRevenue, targetContributionMarginRate) {
      return roundMoney(toNumber(netRevenue) * (1 - toNumber(targetContributionMarginRate)));
    }
    function formatPercent(value) {
      return `${Math.round(toNumber(value) * 1000) / 10}%`;
    }
    function getRecordMonth(record) {
      return String(record && record.date ? record.date : "").slice(0, 7);
    }
    function flattenSales(state) {
      const records = (state && Array.isArray(state.dailyRecords)) ? state.dailyRecords : [];
      return records.flatMap((record) => (
        (Array.isArray(record.sales) ? record.sales : []).map((line) => ({ record, line }))
      ));
    }
    function getLatestRecord(state) {
      const records = (state && Array.isArray(state.dailyRecords)) ? state.dailyRecords : [];
      return records.slice().sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))[0] || null;
    }
    function getLatestFixedExpenseMonth(state) {
      const fixedExpenses = (state && Array.isArray(state.fixedExpenses)) ? state.fixedExpenses : [];
      return fixedExpenses
        .map((item) => String(item && item.month ? item.month : ""))
        .filter(Boolean)
        .sort((a, b) => b.localeCompare(a))[0] || "";
    }
    function getFixedExpensesForMonth(state, month) {
      return ((state && Array.isArray(state.fixedExpenses)) ? state.fixedExpenses : [])
        .filter((item) => item && item.month === month)
        .reduce((sum, item) => sum + toNumber(item.amount), 0);
    }
    function summarizeRecords(records, state, options) {
      const settings = options || {};
      const sourceRecords = Array.isArray(records) ? records : [];
      const skuSummary = sourceRecords.reduce((result, record) => {
        (Array.isArray(record.sales) ? record.sales : []).forEach((line) => {
          result.netRevenue += toNumber(line.netRevenue);
          result.contributionProfit += toNumber(line.contributionProfitSnapshot);
          result.targetProfit += toNumber(line.targetContributionProfitSnapshot);
          result.qty += toNumber(line.qty);
        });
        result.transactions += toNumber(record.transactions);
        return result;
      }, { netRevenue: 0, contributionProfit: 0, targetProfit: 0, qty: 0, transactions: 0 });
      const nonSkuSummary = sourceRecords.reduce((result, record) => {
        (Array.isArray(record.categorySales) ? record.categorySales : []).forEach((item) => {
          const netRevenue = toNumber(item.netRevenue);
          const contributionProfit = netRevenue * (1 - toNumber(item.estimatedCostRate));
          result.categoryNetRevenue += netRevenue;
          result.categoryContributionProfit += contributionProfit;
          result.categoryTargetProfit += contributionProfit;
        });
        const otherRevenue = toNumber(record.otherRevenue);
        result.otherRevenue += otherRevenue;
        // Other revenue has no cost-rate field in the PRD model, so treat it as 100% contribution.
        result.otherContributionProfit += otherRevenue;
        result.otherTargetProfit += otherRevenue;
        return result;
      }, {
        categoryNetRevenue: 0,
        categoryContributionProfit: 0,
        categoryTargetProfit: 0,
        otherRevenue: 0,
        otherContributionProfit: 0,
        otherTargetProfit: 0
      });
      const fixedExpenses = settings.includeFixedExpenses
        ? getFixedExpensesForMonth(state, settings.month || getRecordMonth(sourceRecords[0]))
        : 0;
      const netRevenue = skuSummary.netRevenue + nonSkuSummary.categoryNetRevenue + nonSkuSummary.otherRevenue;
      const contributionProfit = skuSummary.contributionProfit + nonSkuSummary.categoryContributionProfit + nonSkuSummary.otherContributionProfit;
      const targetProfit = skuSummary.targetProfit + nonSkuSummary.categoryTargetProfit + nonSkuSummary.otherTargetProfit;
      const profitGap = targetProfit - contributionProfit;
      return Object.assign(roundMoneyObject({
        netRevenue,
        skuNetRevenue: skuSummary.netRevenue,
        categoryNetRevenue: nonSkuSummary.categoryNetRevenue,
        otherRevenue: nonSkuSummary.otherRevenue,
        contributionProfit,
        targetProfit,
        profitGap,
        fixedExpenses,
        operatingProfit: contributionProfit - fixedExpenses,
        qty: skuSummary.qty,
        transactions: skuSummary.transactions
      }), { monthKey: settings.month || "" });
    }
    function calculateDashboardMetrics(state) {
      const latestRecord = getLatestRecord(state);
      if (!latestRecord) {
        const monthKey = getLatestFixedExpenseMonth(state);
        return {
          today: summarizeRecords([], state),
          month: summarizeRecords([], state, { month: monthKey, includeFixedExpenses: true })
        };
      }
      const latestMonth = getRecordMonth(latestRecord);
      const monthRecords = ((state && Array.isArray(state.dailyRecords)) ? state.dailyRecords : [])
        .filter((record) => getRecordMonth(record) === latestMonth);
      return {
        today: summarizeRecords([latestRecord], state, { month: latestMonth }),
        month: summarizeRecords(monthRecords, state, { month: latestMonth, includeFixedExpenses: true })
      };
    }
    function snapshotSaleLine(product, qty, adjustments, state) {
      const productItem = product || {};
      const settings = adjustments || {};
      const quantity = toNumber(qty);
      const unitPriceSnapshot = toNumber(productItem.price);
      const grossRevenue = roundMoney(unitPriceSnapshot * quantity);
      const discount = roundMoney(settings.discount);
      const refund = roundMoney(settings.refund);
      const giveawayAmount = roundMoney(settings.giveawayAmount);
      const channelFee = roundMoney(settings.channelFee);
      const netRevenue = roundMoney(grossRevenue - discount - refund - giveawayAmount - channelFee);
      const targetContributionMarginRateSnapshot = toNumber(productItem.targetContributionMarginRate);
      const costSnapshot = calculateProductStandardCost(productItem, state);
      const standardCostSnapshot = costSnapshot.standardCost;
      const allowableCostSnapshot = calculateAllowableCost(netRevenue, targetContributionMarginRateSnapshot);
      const targetContributionProfitSnapshot = roundMoney(netRevenue - allowableCostSnapshot);
      const contributionProfitSnapshot = roundMoney(netRevenue - standardCostSnapshot * quantity);
      const profitGapSnapshot = roundMoney(targetContributionProfitSnapshot - contributionProfitSnapshot);
      return {
        productId: productItem.id,
        qty: quantity,
        unitPriceSnapshot,
        grossRevenue,
        discount,
        refund,
        giveawayAmount,
        channelFee,
        netRevenue,
        targetContributionMarginRateSnapshot,
        ingredientCostSnapshot: costSnapshot.ingredientCost,
        packagingCostSnapshot: costSnapshot.packagingCost,
        directLaborCostSnapshot: costSnapshot.directLaborCost,
        standardLossCostSnapshot: costSnapshot.standardLossCost,
        standardCostSnapshot,
        allowableCostSnapshot,
        targetContributionProfitSnapshot,
        contributionProfitSnapshot,
        profitGapSnapshot,
        channel: settings.channel || (channelFee > 0 ? "delivery" : "store")
      };
    }
    function getLineCostBreakdown(line, productItem, state) {
      const snapshotFields = [
        "ingredientCostSnapshot",
        "packagingCostSnapshot",
        "directLaborCostSnapshot",
        "standardLossCostSnapshot"
      ];
      const hasComponentSnapshot = snapshotFields.every((field) => (
        line && typeof line[field] === "number" && Number.isFinite(line[field])
      ));
      if (hasComponentSnapshot) {
        return {
          ingredientCost: toNumber(line.ingredientCostSnapshot),
          packagingCost: toNumber(line.packagingCostSnapshot),
          directLaborCost: toNumber(line.directLaborCostSnapshot),
          standardLossCost: toNumber(line.standardLossCostSnapshot)
        };
      }
      if (line && typeof line.standardCostSnapshot === "number" && Number.isFinite(line.standardCostSnapshot)) {
        return {
          ingredientCost: toNumber(line.standardCostSnapshot),
          packagingCost: 0,
          directLaborCost: 0,
          standardLossCost: 0
        };
      }
      return calculateProductStandardCost(productItem, state);
    }
    function suggestion(type, level, productId, title, evidence, action, impact) {
      const severityBase = { urgent: 300, watch: 200, opportunity: 100 };
      const estimatedMonthlyProfitImpact = roundMoney(impact);
      return {
        type,
        level,
        productId: productId || null,
        title,
        evidence,
        action,
        estimatedMonthlyProfitImpact,
        priority: toNumber(severityBase[level]) + Math.max(0, estimatedMonthlyProfitImpact)
      };
    }
    function hashText(value) {
      const text = String(value || "");
      let hash = 0;

    function calculateWeightedAveragePurchasePrice(ingredientItem) {
      const history = Array.isArray(ingredientItem && ingredientItem.purchaseHistory) ? ingredientItem.purchaseHistory : [];
      const totals = history.reduce((result, item) => {
        const qty = clampNonNegative(item && item.qty);

        const amount = Number.isFinite(explicitTotal) ? explicitTotal : qty * toNumber(item && item.unitPrice);
        result.qty += qty;
        result.amount += amount;
        return result;
      }, { qty: 0, amount: 0 });
      if (totals.qty > 0) return roundMoney(totals.amount / totals.qty);

      const unexplainedCostGap = roundMoney(actualTotal - comparableTheoreticalCost);

      const existing = getLatestCostCheck(state, month);
      return {

    function toCsv(rows) {
      const sourceRows = Array.isArray(rows) ? rows : [];
      if (!sourceRows.length) return "";
      const headers = Array.from(sourceRows.reduce((set, row) => {
        Object.keys(row || {}).forEach((key) => set.add(key));
        return set;
      }, new Set()));
      const escapeCell = (value) => {
        const text = value === null || value === undefined ? "" : String(typeof value === "object" ? JSON.stringify(value) : value);
        const safeText = typeof value === "string" && /^[\s]*[=+\-@]/.test(text) ? `'${text}` : text;
        return /[",\n\r]/.test(safeText) ? `"${safeText.replaceAll("\"", "\"\"")}"` : safeText;
      };
      return [headers, ...sourceRows.map((row) => headers.map((header) => row && row[header]))]
        .map((row) => row.map(escapeCell).join(","))
        .join("\n");
    }
    function sanitizeForExport(value) {
      const blockedKeyPattern = /(secret|token|privateKey|webhookKey)/i;
      if (Array.isArray(value)) return value.map(sanitizeForExport);
      if (!isPlainObject(value)) return value;
      return Object.keys(value).reduce((result, key) => {
        if (blockedKeyPattern.test(key)) return result;
        result[key] = sanitizeForExport(value[key]);
        return result;
      }, {});
    }

    function downloadFile(filename, content, mime) {
      if (
        typeof document === "undefined" ||
        !document.body ||
        typeof document.createElement !== "function" ||
        typeof Blob === "undefined" ||
        typeof URL === "undefined" ||
        typeof URL.createObjectURL !== "function" ||
        typeof URL.revokeObjectURL !== "function"
      ) return false;
      const blob = new Blob([content], { type: mime || "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      return true;
    }

      arrayFields.forEach((field) => {

      const marginAlert = value.config && value.config.marginAlert;
      if (marginAlert !== undefined) {

        if (!isFiniteNumber(marginAlert.good) || !isFiniteNumber(marginAlert.warning) || marginAlert.good <= marginAlert.warning) {

      (Array.isArray(value.products) ? value.products : []).forEach((item, index) => {

    function formatBomForPrompt(bom) {
      return (Array.isArray(bom) ? bom : [])
        .map((item) => `${item.ingredientId}:${toNumber(item.qty)}:${item.unit || ""}`)
        .join("\n");
    }
    function parseBomText(text, state) {
      const raw = String(text || "").trim();
      if (!raw) return [];
      return raw.split(/[\n,，;；]+/)
        .map((part) => part.trim())
        .filter(Boolean)
        .map((part) => {
          const pieces = part.split(/[:：]/).map((piece) => piece.trim());
          if (pieces.length < 2) throw new Error("BOM 格式应为 原料ID:数量:单位");
          const ingredientId = pieces[0];
          const ingredientItem = getIngredient(state, ingredientId);
          if (!ingredientItem) throw new Error(`BOM 原料不存在：${ingredientId}`);
          const qty = parsePromptNumber(pieces[1], "BOM 数量", { min: 0, allowZero: false });
          return {
            ingredientId,
            qty: roundMoney(qty),
            unit: pieces[2] || ingredientItem.baseUnit || ""
          };
        });
    }
    function parsePurchaseLine(text) {
      const raw = String(text || "").trim();
      if (!raw) return null;
      const pieces = raw.split(/[:：]/).map((piece) => piece.trim());
      if (pieces.length < 2) throw new Error("采购记录格式应为 数量:单价:总额");
      const qty = parsePromptNumber(pieces[0], "采购数量", { min: 0, allowZero: false });
      const unitPrice = parsePromptNumber(pieces[1], "采购单价", { min: 0 });
      const purchase = {
        date: todayISO(),
        qty: roundMoney(qty),
        unitPrice: roundMoney(unitPrice)
      };
      if (pieces[2] !== undefined && pieces[2] !== "") {
        purchase.totalAmount = roundMoney(parsePromptNumber(pieces[2], "采购总额", { min: 0 }));
      }
      return purchase;
    }
